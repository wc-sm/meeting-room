name: Update ALR Booking Data

on:
  schedule:
    - cron: '0 * * * *'   # Runs every hour, on the hour
  workflow_dispatch:        # Allows manual trigger from the Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Needed to commit data.json back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch Calendly data
        env:
          CALENDLY_API_TOKEN: ${{ secrets.CALENDLY_API_TOKEN }}
        run: node fetch_data.js

      - name: Commit and push if data changed
        run: |
          git config user.name  "GitHub Actions"
          git config user.email "actions@github.com"
          git add data.json
          git diff --staged --quiet \
            && echo "No changes to data.json – skipping commit." \
            || (git commit -m "Update ALR booking data [automated]" && git push)
